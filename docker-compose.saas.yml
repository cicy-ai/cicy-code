services:
  mysql:
    image: mysql:8.0
    container_name: cicy-mysql
    restart: always
    network_mode: host
    environment:
      MYSQL_ROOT_PASSWORD: cicy-code
      MYSQL_DATABASE: cicy_code
    volumes:
      - mysql-data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-flush-log-at-trx-commit=2
      --innodb-buffer-pool-size=128M
      --max-allowed-packet=64M

  redis:
    image: redis:7-alpine
    container_name: cicy-redis
    restart: always
    network_mode: host
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  mitmproxy:
    image: cicybot/mitmproxy:latest
    container_name: cicy-mitmproxy
    restart: unless-stopped
    network_mode: host
    volumes:
      - mitmproxy-data:/home/mitmproxy/.mitmproxy
    command: mitmdump -p 8003 --ssl-insecure --set block_global=false --set proxyauth=any -s /app/kiro_monitor.py

volumes:
  mysql-data:
  redis-data:
  mitmproxy-data:
