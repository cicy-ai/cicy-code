name: Release

on:
  push:
    paths:
      - 'npm/package.json'
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./npm/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cross-compile binaries
        if: steps.check.outputs.exists == 'false'
        working-directory: api
        run: |
          mkdir -p ../dist
          GOOS=darwin GOARCH=arm64 go build -o ../dist/cicy-code-darwin-arm64 ./mgr/
          GOOS=darwin GOARCH=amd64 go build -o ../dist/cicy-code-darwin-amd64 ./mgr/
          GOOS=linux  GOARCH=amd64 go build -o ../dist/cicy-code-linux-amd64  ./mgr/
          GOOS=linux  GOARCH=arm64 go build -o ../dist/cicy-code-linux-arm64  ./mgr/
          ls -lh ../dist/

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            dist/cicy-code-darwin-amd64 \
            dist/cicy-code-darwin-arm64 \
            dist/cicy-code-linux-amd64 \
            dist/cicy-code-linux-arm64 \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        run: |
          cd npm
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
