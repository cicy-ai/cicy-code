services:
  ide-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./ide:/app
      - ide_modules:/app/node_modules
    ports:
      - "6903:6902"
    command: sh -c "npm install && npm run dev"
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

volumes:
  ide_modules:
