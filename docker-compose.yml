services:
  mysql:
    image: mysql:8.0
    container_name: cicy-mysql
    restart: always
    network_mode: host
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_TCP_PORT: ${MYSQL_PORT:-3306}
    volumes:
      - mysql-data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-flush-log-at-trx-commit=2
      --innodb-buffer-pool-size=128M
      --max-allowed-packet=64M
      --port=${MYSQL_PORT:-3306}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: cicy-redis
    restart: always
    network_mode: host
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --port ${REDIS_PORT:-6379}
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT:-6379}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  app-dev:
    image: node:20-alpine
    container_name: cicy-app-dev
    working_dir: /app
    network_mode: host
    volumes:
      - ./app:/app
      - app_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: cicy-nginx
    restart: always
    network_mode: host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app/dist:/usr/share/nginx/html:ro

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: cicy-phpmyadmin
    restart: unless-stopped
    network_mode: host
    environment:
      PMA_HOST: 127.0.0.1
      PMA_PORT: ${MYSQL_PORT:-3306}
      APACHE_PORT: 8899

volumes:
  mysql-data:
  redis-data:
  app_modules:
