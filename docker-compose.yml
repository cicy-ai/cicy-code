services:
  mysql:
    image: mysql:8.0
    container_name: cicy-mysql
    restart: always
    network_mode: host
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql-data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-flush-log-at-trx-commit=2
      --innodb-buffer-pool-size=128M
      --max-allowed-packet=64M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: cicy-redis
    restart: always
    network_mode: host
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  ide-dev:
    image: node:20-alpine
    container_name: cicy-ide-dev
    working_dir: /app
    network_mode: host
    volumes:
      - ./ide:/app
      - ide_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: cicy-nginx
    restart: always
    network_mode: host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ide/dist:/usr/share/nginx/html:ro

  code-server:
    image: codercom/code-server:latest
    container_name: cicy-code-server
    restart: unless-stopped
    network_mode: host
    volumes:
      - /home/w3c_offical:/home/coder/host
      - code-server-data:/home/coder/.local/share/code-server
    command: --bind-addr 0.0.0.0:8002 --auth none

  mitmproxy:
    build: ./mitmproxy
    container_name: cicy-mitmproxy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./mitmproxy/kiro_monitor.py:/app/kiro_monitor.py:ro
      - mitmproxy-data:/home/mitmproxy/.mitmproxy
    command: mitmdump -p 8003 --ssl-insecure --set block_global=false --set proxyauth=any -s /app/kiro_monitor.py

volumes:
  mysql-data:
  redis-data:
  ide_modules:
  code-server-data:
  mitmproxy-data:
