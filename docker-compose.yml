services:
  app-dev:
    image: node:20-alpine
    container_name: cicy-app-dev
    working_dir: /app
    network_mode: host
    volumes:
      - ./app:/app
      - app_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

volumes:
  app_modules:
